<html>
    <head>
        <title>Animations</title>
        <style>
            div{
                width:100px;
                height:100px;
                background-color: aqua;
                border:2px solid;
                animation-name:anim ;
                animation-duration: 3s;
            }
            @keyframes anim{
                0%{background-color: aqua;}
                40%{background-color: violet;}
                50%{background-color: blue;}
                80%{background-color: brown;}
                100%{background-color: black;}
            }
        </style>
    </head> 
    <body>
        <div class="anim"></div>
    </body>
</html>
