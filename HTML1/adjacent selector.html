<html>
    <head>
        <title>Adjacent selector</title>
    <style>
        span+h2{
            background-color: aquamarine;
            color: blue;
            font-size: medium;
            text-align: center;
        }
         </style>
         </head>
         <body>
            <div>
                <p>first p tag</p>
                <p>second p tag</p>
                <p>Heading</p>
            </div>
            <span>
                <h2>Second Heading</h2>
                <p>p tag inside span class</p>
            </span>
       </body>
</html>
