<!--
ID selector
selectors a single element with a specific ID.
syntax: .classname
-->
<html>
<head>
<title>Class selector</title>
<style type="text/CSS">
.c1
{
 background-color:skyblue;
}
</style>
</head>
<body>
<h2>Class Selector</h2>
<p>para1</p>
<p class="c1">para2</p>
<p>para3</p>
<p class="c1">para4</p>
<p>para5</p>
</body>
</html>
