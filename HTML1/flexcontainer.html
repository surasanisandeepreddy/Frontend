<html>
    <head>
        <title>Flex container</title>
        <style>
            div{
                border: 3px solid;
            }
            .container{
               display:flex;
               flex-direction: row;
               flex-wrap: wrap;
            }
            .c1{
                color:cornflowerblue;
            }
            .c2{
                color:orangered;
            }
            .c3{
                color:green;
            }
        </style>
    </head>
    <body>
    <div>
        <div class="c1">sandeep</div>
        <div class="c1">praneeth</div>
        <div class="c2">sharif</div>
        <div class="c2">shafi</div>
        <div class="c3">anwar</div>
        <div class="c3">koushik</div>
    </div>
    </body>
</html>
