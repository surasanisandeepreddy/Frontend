<html>
    <head>
        <title>matrix</title>
        <style>
            .matrix{
                width: 300px;
                height:100px;
                background-color: brown;
                border:1px solid;
                transform:matrix(2,0,100,4,50,50);
            }
            .matrix:hover{
                width: 200px;
                height: 300px;
                border:1px solid;
                background-color: rgb(70, 23, 114);
            } 
        </style>
    </head>
    <body>
        <div class="matrix">Sandeep</div>
    </body>
</html>
