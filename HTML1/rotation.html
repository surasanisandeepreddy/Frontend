<html>
    <head>
        <title>rotation</title>
        <style>
            .transform{
                width: 100px;
                height:100px;
                background-color: brown;
                border:2px solid;
                transform:rotate(210deg);
            }
            .transform:hover{
                width: 100px;
                height: 100px;
                background-color: rgb(70, 23, 114);
            } 
        </style>
    </head>
    <body>
        <div class="transform">Sandeep</div>
    </body>
</html>
