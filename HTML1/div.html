<!DOCTYPE html>
<html>
<head>
  <title>HTML Elements Example</title>
</head>
<body>

  <div style="background-color: #f0f0f0; padding: 10px;">
    <h2>Welcome to My Page</h2>
    <p>This section is wrapped inside a <code>&lt;div&gt;</code> element.</p>
  </div>

  <hr>

  <div>
    <p>
      Here's a sentence with a 
      <span style="color: blue; font-weight: bold;">highlighted word</span>.
      <br>
      And this line is after a line break.
    </p>
  </div>

</body>
</html>
