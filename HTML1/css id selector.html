<html>
    <head>
        <title>Internal ID selector</title>
        <style type="text/CSS">
            #p{
                font-family: Arial, Helvetica, sans-serif;
                color: #00ccff;
                font-weight: italic;
                letter-spacing: 6px;
                line-height: normal;
                text-decoration: none;
                word-spacing: normal;
            }
            #p2{
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                background-color: green;
                font-weight: bold;
                letter-spacing: 3px;
                line-height: 100px;
                word-spacing: 20px;
                text-decoration: underline;
                text-indent: 0px;
            }
            #p3{
                background-color: blue;
                font-weight: normal;
                letter-spacing: normal;
                text-decoration: overline;
                word-spacing: 50px;
                text-indent: 20px;
            }
            #p4{
                text-decoration: line-through;
                text-indent: 80px;
            }
        </style>
    </head>
    <body>
        <p id="p4">Hello</p>
        <p id="p">MRUH welcome</p>
        <p id="p2">hiiiii guyssss</p>
        <p id="p3">Tata bye bye</p>



    </body>
</html>
