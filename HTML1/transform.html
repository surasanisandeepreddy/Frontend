<html>
    <head>
        <title>transform</title>
        <style>
            .transform{
                width: 100px;
                height:100px;
                background-color: brown;
                border:2px solid;
                transform:translate(50px,100px);
            }
            .transform:hover{
                width: 100px;
                height: 100px;
                background-color: blueviolet;
            } 
        </style>
    </head>
    <body>
        <div class="transform">Sandeep</div>
    </body>
</html>
