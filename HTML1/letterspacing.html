<html>
    <head>
        <title>Internal ID selector</title>
        <style type="text/CSS">
            #p{
                font-family: Arial, Helvetica, sans-serif;
                color: #00ccff;
                font-weight: italic;
                letter-spacing: 6px;
            }
            #p2{
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                background-color: green;
                font-weight: bold;
                letter-spacing: 3px;
            }
            #p3{
                background-color: blue;
                font-weight: normal;
                letter-spacing: normal;
            }
        </style>
    </head>
    <body>
        <p>Hello</p>
        <p id="p">MRUH</p>
        <p id="p2">MRUH</p>
        <p id="p3">MRUH</p>



    </body>
</html>
