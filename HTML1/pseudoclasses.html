<html>
    <head>
        <title>Pseudo classes</title>
        <style>
            p:hover{
                background-color: aqua;
                border:2px solid;
                font-size: 24px;
            }
            #btn:active{
                background-color: red;
            }
            #un:focus{
                background-color: blue;
            }
            a:visited{
                color:blueviolet;
            }

        </style>
    </head>
    <body>
        <p>This is hover class</p>
        <input id="btn" type="button"  value="click" name="click"> 
        <input id="un" placeholder="moviename" type="text">
        <a href="https://www.flipkart.com/">flipk art</a>
    </body> 
</html>
