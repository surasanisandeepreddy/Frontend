    <head>
        <title>List</title>
        <style type="text/CSS">
            #list1{
                list-style-type: disc;
            }
            #list2{
                list-style-type: square;
            }
            #list3{
                list-style-type: circle;
            }
            #list4{
                list-style-type: none;
            }
            
        </style>
    </head>
    <body>

            <li>Mango</li>
            <li>Guava</li>
        </ul><ul id="list2">

            <li>Orange</li>
        </ul>
        <ul id="list3">

            <li>omg</li>

        </ul>
        <ul id="list4">
            <li>wow</li>

</html>
