<html>
    <head>
        <title>Transitions</title>
        <style>
            .trans{
                width:100px;
                height:400px;
                border:1px solid;
                background-color: aqua;
                transition-duration: 5s;
                transition-property: width; 
                transition-timing-function: ease-in;
                transition-delay: 1s;
            } 
            .trans:hover{
                width:200px;
                height:100px;
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <div class="trans">CSE</div>
    </body>
</html>
