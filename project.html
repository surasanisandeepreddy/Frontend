<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Essentials Demo</title>
</head>
<body>
    <h1>JavaScript Essentials</h1>
    <script>
        console.log("==== Variables ====");

        let studentName = "Sandeep";
        let age = 20;
        let rollno = 663;

        let college = "MRU";
        console.log(studentName);
        console.log(age);
        console.log(rollno);
        console.log(college);


        console.log("===== Operators ====")
        let a = 30;
        let b = 20;

        console.log("Addition:", a + b);
        console.log("Substraction:", a - b);
        console.log("Multiplication:", a * b);
        console.log("Division:", a / b);


        let day = Number(prompt("States a num(1-7) :"));

        switch(day){

            case 1:
                console.log("Monday");
                break;

            case 2:
                console.log("Tuesday");
                break;  
                
            case 3:
                console.log("Wednesday");
                break;

             case 4:
                console.log("Thursday");
                break;  
             
             case 5:
                console.log("Friday");
                break; 
             
             case 6:
                console.log("Saturday");
                break; 

             case 7:
                console.log("Sunday");
                break;   
              
             default:
                console.log("Invalid");
                   
        }
    </script>
</body>
</html>
